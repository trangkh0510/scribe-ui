    Babel.registerPreset("react-classic", {

  <style>
    :root{
      --brand-blue:#0033C9;
      --brand-green:#00CF6A;
      --brand-green-dark:#00b85d;
      --green-text:#00a854;
      --bg-page:#f7f8fb;
      --bg-surface:#ffffff;
      --bg-soft:#f1f3f8;
      --text-primary:#15181f;
      --text-secondary:#5b6273;
      --text-tertiary:#9aa1b2;
      --border:#e6e8ef;
      --border-strong:#d3d7e2;
      --danger:#e24b4a;
      --radius-card:22px;
      --radius-field:14px;
      --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      --font-mono:"SF Mono",ui-monospace,Menlo,Monaco,Consolas,monospace;
    }
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg-page);font-family:var(--font-sans);color:var(--text-primary);-webkit-font-smoothing:antialiased;padding:2rem 1rem;}
    .sb-wrap{max-width:640px;margin:0 auto;}

    .sb-header{display:flex;align-items:center;justify-content:space-between;padding:0 6px;margin-bottom:1.5rem;}
    .logo-box{width:42px;height:42px;border-radius:12px;background:var(--brand-blue);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:14px;box-shadow:0 4px 14px rgba(0,51,201,0.3);}
    .logo-zp{font-size:11px;color:var(--text-tertiary);border:1.5px dashed var(--border-strong);padding:7px 11px;border-radius:9px;}

    .sb-card{background:var(--bg-surface);border:1.5px solid rgba(0,51,201,0.35);border-radius:var(--radius-card);padding:1.8rem;box-shadow:0 2px 6px rgba(0,0,0,0.04),0 18px 50px rgba(0,51,201,0.07);transition:box-shadow .4s ease,transform .4s ease,border-color .4s ease;margin-bottom:1.4rem;}
    .sb-card:hover{box-shadow:0 4px 10px rgba(0,0,0,0.05),0 26px 70px rgba(0,51,201,0.12);transform:translateY(-2px);border-color:rgba(0,51,201,0.5);}

    .card-head{display:flex;align-items:center;gap:14px;margin-bottom:1.4rem;}
    .badge-n{width:34px;height:34px;border-radius:11px;background:var(--brand-blue);color:#fff;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,51,201,0.32);flex-shrink:0;}
    .card-title{margin:0;font-size:19px;font-weight:600;}
    .card-sub{margin:0;font-size:12px;color:var(--text-secondary);}

    .flt{position:relative;margin-bottom:14px;}
    .flt-in{width:100%;height:62px;padding:24px 16px 8px;border:1.5px solid var(--border);border-radius:var(--radius-field);background:var(--bg-surface);font-size:14px;color:var(--text-primary);outline:none;transition:border-color .25s ease,box-shadow .25s ease;font-family:var(--font-sans);}

    .flt-in:not(:placeholder-shown) ~ .flt-lb,

    .flt-static ~ .flt-lb{top:11px;font-size:11px;font-weight:500;letter-spacing:.2px;}
    .flt textarea.flt-in{height:auto;min-height:96px;padding-top:26px;resize:vertical;line-height:1.55;font-family:var(--font-mono);font-size:13px;}
    select.flt-in{appearance:none;-webkit-appearance:none;background-image:none;cursor:pointer;}

    .lbl{font-size:13px;font-weight:500;color:var(--text-secondary);display:block;margin-bottom:9px;}
    .row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:10px;}

    .dz{border:2px dashed rgba(0,51,201,0.35);border-radius:16px;padding:2.1rem;text-align:center;background:rgba(0,51,201,0.025);transition:all .3s ease;cursor:pointer;margin-bottom:16px;}
    .dz:hover,.dz.drag{border-color:var(--brand-blue);background:rgba(0,51,201,0.06);}
    .dz:hover .dz-ic{transform:translateY(-4px);}

    .dz-t{margin:11px 0 2px;font-size:14px;font-weight:500;}

    .success-ic{width:64px;height:64px;border-radius:18px;background:rgba(0,207,106,0.13);color:var(--brand-green);display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 1.1rem;}

    .btn-primary:hover{background:var(--brand-green-dark);transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,207,106,0.46);}
    .btn-outline{border:1.5px solid var(--brand-blue);border-radius:14px;padding:14px 26px;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s ease;background:var(--bg-surface);color:var(--brand-blue);display:inline-flex;align-items:center;gap:7px;font-family:var(--font-sans);text-decoration:none;}
    .btn-outline:hover{background:rgba(0,51,201,0.05);transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,51,201,0.16);}

    /* Toast */
    .toast{position:fixed;top:1rem;right:1rem;z-index:50;background:var(--danger);color:#fff;padding:12px 16px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.18);display:flex;align-items:center;gap:12px;max-width:340px;font-size:13px;}
    .toast button{background:none;border:none;color:rgba(255,255,255,.85);cursor:pointer;font-size:14px;}

    .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    @keyframes sb-spin { to { transform: rotate(360deg); } }
    .ti-spin { display:inline-block; animation: sb-spin .8s linear infinite; }

    .elapsed{font-size:11px;color:var(--text-tertiary);font-variant-numeric:tabular-nums;}
    .pbar{height:6px;border-radius:99px;background:var(--bg-soft);overflow:hidden;margin:12px 0 6px;}
    .pbar > i{display:block;height:100%;background:var(--brand-blue);border-radius:99px;}
    .pbar.det > i{width:100%;transform-origin:left;transform:scaleX(0);transition:transform .4s ease;}
    .pbar.indet > i{width:38%;animation:sb-indet 1.1s ease-in-out infinite;}
    @keyframes sb-indet{0%{transform:translateX(-110%)}100%{transform:translateX(320%)}}

    .an-panel{border:1.5px solid var(--border);border-radius:var(--radius-field);padding:16px 18px;margin-top:16px;background:var(--bg-surface);}
    .an-panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
    .an-panel-title{font-size:13px;font-weight:600;color:var(--text-secondary);}
    .steps{list-style:none;margin:14px 0 0;padding:0;display:flex;flex-direction:column;gap:11px;}
    .step{display:flex;align-items:center;gap:11px;font-size:13px;color:var(--text-tertiary);transition:color .3s ease;}
    .step .dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:1.5px solid var(--border);background:var(--bg-surface);flex-shrink:0;transition:all .3s ease;}
    .step.active{color:var(--brand-blue);font-weight:600;}
    .step.active .dot{border-color:var(--brand-blue);color:var(--brand-blue);}
    .step.done{color:var(--green-text);}
    .step.done .dot{border-color:var(--brand-green);background:var(--brand-green);color:#fff;}

    @media (max-width:560px){ .grid-2{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react-classic">
const { useState, useRef, useEffect } = React;

/* =========================================================================
   1. VTT PARSE ENGINE (pure JS)
   ========================================================================= */
function toSeconds(ts) {
  const parts = ts.trim().split(":").map(parseFloat);
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  return parts[0] || 0;
}
function fmtMMSS(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}
function stripTags(s) {
  return s.replace(/<[^>]*>/g, "").trim();
}

function parseVTT(rawText) {
  const normalized = rawText.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  const blocks = normalized.split(/\n\s*\n/);
  const raw = [];

  for (const block of blocks) {
    const lines = block.split("\n").map((l) => l.trim()).filter(Boolean);
    if (!lines.length) continue;

    let tsLine = null;
    const contentLines = [];
    for (const line of lines) {
      if (/^WEBVTT/i.test(line)) continue;
      if (/^NOTE/i.test(line)) continue;
      if (/^\d+$/.test(line)) continue;            // sequence number
      if (line.includes("-->")) { tsLine = line; continue; }
      contentLines.push(line);
    }
    if (!contentLines.length) continue;

    const startRaw = tsLine ? tsLine.split("-->")[0].trim() : "0";
    const startSec = toSeconds(startRaw);

    let content = contentLines.join(" ");
    let speaker = "Unknown";

    const vMatch = content.match(/<v\s+([^>]+)>/i);
    if (vMatch) {
      speaker = vMatch[1].trim();
      content = stripTags(content);
    } else if (/^[^:]{1,40}:\s/.test(content)) {
      const idx = content.indexOf(": ");
      speaker = content.slice(0, idx).trim();
      content = content.slice(idx + 2).trim();
    } else {
      content = stripTags(content);
    }
    content = stripTags(content);
    if (!content) continue;

    raw.push({ speaker, startSec, start: fmtMMSS(startSec), text: content });
  }

  // Merge cue liên tiếp cùng speaker, gap < 2.0s
  const merged = [];
  for (const seg of raw) {
    const prev = merged[merged.length - 1];
    if (prev && prev.speaker === seg.speaker && seg.startSec - prev.startSec < 2.0) {
      prev.text = (prev.text + " " + seg.text).trim();
    } else {
      merged.push({ ...seg });
    }
  }

  // Fallback speaker labels
  let nextLabel = 0;
  for (const seg of merged) {
    if (seg.speaker === "Unknown") {
      seg.speaker = `Speaker ${String.fromCharCode(65 + nextLabel)}`;
      nextLabel++;
    }
  }
  return merged;
}

// Parse transcript thô không phải VTT (file .doc/.docx/.txt đã extract text).
function parsePlainTranscript(rawText) {
  const normalized = rawText.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  const lines = normalized.split("\n").map((l) => l.trim());
  const segs = [];

  for (const line of lines) {
    if (!line) continue;

    let m = line.match(/^\*{0,2}\[\s*([^\]]+?)\s*[-–]\s*(\d{1,2}:\d{2}(?::\d{2})?)\s*\]\*{0,2}:?\s*(.*)$/);
    if (m) {
      segs.push({ speaker: m[1].trim(), start: m[2], startSec: toSeconds(m[2]), text: m[3].trim() });
      continue;
    }
    m = line.match(/^\*{0,2}\[\s*([^\]]{1,40})\s*\]\*{0,2}:?\s*(.*)$/);
    if (m) {
      segs.push({ speaker: m[1].trim(), start: "", startSec: 0, text: m[2].trim() });
      continue;
    }
    m = line.match(/^([^:]{1,40}):\s+(.*)$/);
    if (m) {
      segs.push({ speaker: m[1].trim(), start: "", startSec: 0, text: m[2].trim() });
      continue;
    }
    if (segs.length) {
      segs[segs.length - 1].text = (segs[segs.length - 1].text + " " + line).trim();
    } else {
      segs.push({ speaker: "Speaker A", start: "", startSec: 0, text: line });
    }
  }

  return segs.filter((s) => s.text);
}

function segmentsToText(segments) {
  return segments
    .map((s) => `[${s.speaker}${s.start ? ` - ${s.start}` : ""}]\n${s.text}`)
    .join("\n\n");
}

/* =========================================================================
   2. RULE COMPILER
   ========================================================================= */
const HARD_INSTRUCTION = `Bạn là chuyên gia làm sạch transcript phỏng vấn UX research tiếng Việt.

Nguyên tắc bất biến:
- Precision > Recall: thà bỏ sót lỗi còn hơn sửa sai từ đúng
- Giữ nguyên giọng nói tự nhiên, không chuẩn hóa về văn phong formal
- Không thêm thông tin, không diễn giải, không tóm tắt
- Giữ nguyên cấu trúc [Speaker - Timestamp] của từng turn
- Chỉ trả về transcript đã làm sạch, không có giải thích hay chú thích`;

const STAGE_SNIPPETS = {
  0: `STAGE 0 - PRE-PROCESSING:
- Chuẩn hóa encoding UTF-8, collapse multiple spaces, trim mỗi dòng
- Detect giọng miền Nam: nếu có ≥3 từ trong [hổng, hem, hông, dzậy, tui, ổng, bả, dìa, dzô, nhen, nghen, mắc(đắt)] → bật regional ruleset cho Stage 2 và 5
- Detect topic context theo sliding window 10 câu: [thanh toán/giao dịch | mua sắm online | trải nghiệm app | gia đình/cá nhân | giá cả/tiền]`,
  1: `STAGE 1 - TOKEN LOCKING:
- Tuyệt đối không sửa: số điện thoại (10 số bắt đầu 0), mã giao dịch (≥8 ký tự liên tiếp), OTP (4-6 số sau "mã/OTP/xác nhận"), năm lịch (1900-2099)
- Tuyệt đối không sửa: speaker labels, timestamps, tags [INAUDIBLE], [CROSSTALK]
- Ma trận quyết định: với bất kỳ token nghi ngờ nào, hỏi: có trong vùng locked không? → Có: bỏ qua hoàn toàn`,
  2: `STAGE 2 - LỖI ASR NẶNG:
Brand/App lexicon — replace theo thứ tự ưu tiên:
  1. Zalopay, ZaloPay, zalo pay → Zalopay
  2. Ví điện tử: MoMo → MoMo, VNPay → VNPay, vờ en bây/vi en pay → VNPay
  3. App: Shopee/shoppy/sô pi → Shopee, Grab/grap/gréb → Grab, Traveloka/tra va lô ca → Traveloka
  4. Ngân hàng: Vietcombank/việt cơm băng → Vietcombank
Code-switching (auto-fix): vau chờ → voucher, cát bắt → cashback, căm pen → campaign, lai xờ trim → livestream, ắp đết → update, tốp áp → top-up, rì phăn → refund, ô đờ → order, phờ ri síp → freeship
Code-switching (cần context ±5 token): seo+[giảm/giá/mua/đợt] → sale; linh+[gửi/bấm/click/mở] → link
Giọng miền Nam tầng 1 (nếu IS_SOUTHERN): dìa/dzề/dia/dề → về; dô/dzô/giô → vào; dới/dzới → với; dzậy/dậy/giậy → vậy; mộk → một; tốk → tốt`,
  3: `STAGE 3 - SỐ & ĐƠN VỊ:
Phân biệt "năm" vs số 5:
  - "5 + năm lịch [1900-2099]" → "năm + số"
  - Cụm cố định: 5 ngoái/nay/sau/trước/học → năm ngoái/nay/sau/trước/học
  - "sinh viên/học sinh/năm học + 5 + [1-6]" → thay 5 bằng "năm" (ngoại lệ: "lớp 5" giữ nguyên)

const FINAL_QA = `STAGE 9 - FINAL QA & TAGGING:
Đảm bảo các tags chuẩn: [INAUDIBLE], [CS_TERM], [CROSSTALK], [INCOMPLETE], [BACKCHANNEL], [POSSIBLE_NAME: X], [POSSIBLE: X]
Tổng hợp tất cả vị trí được flag thành block "--- REVIEW QUEUE ---" ở cuối output`;

function compileSystemPrompt(activeStages, customRules) {
  let prompt = HARD_INSTRUCTION + "\n\n";
  const sorted = [...activeStages].sort((a, b) => a - b);
  for (const idx of sorted) {
    if (STAGE_SNIPPETS[idx]) prompt += STAGE_SNIPPETS[idx] + "\n\n";
  }
  prompt += FINAL_QA + "\n\n";
  if (customRules.trim()) {
    prompt += `--- Custom Rules (ưu tiên cao nhất) ---\n${customRules.trim()}\n`;
  }
  return prompt.trim();
}

/* =========================================================================
   3. LLM CALL + CHUNKING (clean step → /api/chat proxy)
   ========================================================================= */
async function callLLM(parsedText, systemPrompt, model) {
  const body = JSON.stringify({
    model,
    max_tokens: 4000,
    // Tắt thinking mode của Qwen — bật sẽ chậm hàng chục giây → gateway 504
    chat_template_kwargs: { enable_thinking: false },
    messages: [
      { role: "system", content: systemPrompt },
      {
        role: "user",
        content: `Đây là transcript thô đã parse:\n\n---\n${parsedText}\n---\n\nÁp dụng các rule trên và trả về transcript đã làm sạch. Chỉ trả về transcript, không giải thích.`,
      },
    ],
  });

  let lastErr;
  // Server-side proxy also paces + retries on 429; these client retries add headroom so a
  // busy per-minute MaaS window resolves itself instead of surfacing as a hard failure.
  const MAX = 4;
  for (let attempt = 1; attempt <= MAX; attempt++) {
    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body,
      });
      if (!response.ok) {
        let detail = "";
        try {
          const err = await response.json();
          detail = err?.error?.message || err?.message || JSON.stringify(err);
        } catch (e) {
          detail = await response.text();
        }
        if ((response.status >= 500 || response.status === 429) && attempt < MAX) {
          lastErr = new Error(`API ${response.status}: ${detail}`);
          await new Promise((r) => setTimeout(r, 6000 * attempt));
          continue;
        }
        throw new Error(`API ${response.status}: ${detail}`);
      }
      const data = await response.json();
      return data.choices?.map((c) => c.message?.content || "").join("") || "";
    } catch (e) {
      lastErr = e;
      if (attempt < MAX) {
        await new Promise((r) => setTimeout(r, 4000 * attempt));
        continue;
      }
      throw lastErr;
    }
  }
  throw lastErr;
}

function chunkByTurns(text, maxTokens = 3000) {
  const turns = text.split(/\n\s*\n/);
  const chunks = [];
  let cur = [];
  let curTokens = 0;
  for (const turn of turns) {
    const t = Math.ceil(turn.length / 4);
    if (curTokens + t > maxTokens && cur.length) {
      chunks.push(cur.join("\n\n"));
      cur = [];
      curTokens = 0;
    }
    cur.push(turn);
    curTokens += t;
  }
  if (cur.length) chunks.push(cur.join("\n\n"));
  return chunks;
}

/* =========================================================================
   4. DOWNLOAD + UTF-8 BASE64
   ========================================================================= */
function tsStamp() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}
function downloadTxt(content, filename) {
  const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename || `transcript_cleaned_${tsStamp()}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function toB64Utf8(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = "";
  bytes.forEach((b) => (bin += String.fromCharCode(b)));
  return btoa(bin);
}

/* =========================================================================
   5. CLEANED-OUTPUT RENDERER (highlights)
   ========================================================================= */
function renderOutput(text) {
  const qIdx = text.indexOf("--- REVIEW QUEUE ---");
  const main = qIdx >= 0 ? text.slice(0, qIdx) : text;
  const queue = qIdx >= 0 ? text.slice(qIdx) : "";

  const renderLine = (line, k) => {
    const speakerMatch = line.match(/^\*{0,2}\[([^\]]+)\]\*{0,2}:?\s*$/);
    if (speakerMatch && /\d/.test(speakerMatch[1])) {
      return <div key={k} className="font-semibold text-indigo-700 mt-3">[{speakerMatch[1]}]</div>;
    }
    const parts = [];
    let last = 0;
    const regex = /\[(INAUDIBLE|BACKCHANNEL|CROSSTALK|INCOMPLETE|CS_TERM|POSSIBLE_NAME:[^\]]*|POSSIBLE:[^\]]*)\]/g;
    let m;
    while ((m = regex.exec(line)) !== null) {
      if (m.index > last) parts.push(line.slice(last, m.index));
      const tag = m[1];
      let cls = "bg-slate-200 text-slate-600";
      if (tag === "INAUDIBLE") cls = "bg-red-100 text-red-700";
      else if (tag === "BACKCHANNEL") cls = "bg-slate-200 text-slate-500 italic";
      else if (tag.startsWith("POSSIBLE_NAME")) cls = "bg-yellow-100 text-yellow-800";
      else if (tag.startsWith("POSSIBLE")) cls = "bg-orange-100 text-orange-700";
      else if (tag === "CROSSTALK") cls = "bg-purple-100 text-purple-700";
      parts.push(
        <span key={`${k}-${m.index}`} className={`px-1 rounded text-xs font-medium ${cls}`}>[{tag}]</span>
      );
      last = m.index + m[0].length;
    }
    if (last < line.length) parts.push(line.slice(last));
    return <div key={k} className="text-slate-700 leading-relaxed">{parts.length ? parts : line || " "}</div>;
  };

  return (
    <div>
      <div>{main.split("\n").map(renderLine)}</div>
      {queue && (
        <div className="mt-4 border border-yellow-300 bg-yellow-50 rounded-lg p-3">
          <div className="flex items-center gap-2 text-yellow-800 font-semibold text-sm mb-2">
            <span>⚠️</span> Review Queue
          </div>
          <pre className="text-xs text-yellow-900 whitespace-pre-wrap font-mono">{queue.replace("--- REVIEW QUEUE ---", "").trim()}</pre>
        </div>
      )}
    </div>
  );
}

// All cleaning stages run in the background — the user never configures them.
const ALL_STAGES = [0, 1, 2, 3, 4, 5, 6, 7, 8];

const TYPES = [

const AN_STEPS = [

  { key: "gate", label: "Kiểm tra điều kiện" },
  { key: "prepare", label: "Chuẩn bị dữ liệu" },

function Toast({ msg, onClose }) {
  if (!msg) return null;
  return (
    <div className="toast">
      <span>{msg}</span>
      <button onClick={onClose}>✕</button>
    </div>
  );
}

function App() {
  // --- Step 1: clean ---
  const [vttRaw, setVttRaw] = useState("");
  const [vttPreview, setVttPreview] = useState("");
  const [fileName, setFileName] = useState("");
  const [parsedSegments, setParsedSegments] = useState([]);
  const [output, setOutput] = useState("");
  const [status, setStatus] = useState("idle");
  const [progress, setProgress] = useState({ current: 0, total: 0 });
  const [errorMsg, setErrorMsg] = useState("");
  const [toast, setToast] = useState("");
  const [copied, setCopied] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef(null);
  const objRef = useRef(null);

  // Grow a textarea to fit its content (up to its CSS max-height, then it scrolls).
  function autoGrow(el) {
    if (!el) return;
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 200) + "px";
  }

  // --- Step 2: analyze ---
  const [analysisText, setAnalysisText] = useState("");
  const [anType, setAnType] = useState("ux");
  const [anObjectives, setAnObjectives] = useState("");
  const [anTitle, setAnTitle] = useState("");
  const [anLang, setAnLang] = useState("auto");
  const [anStatus, setAnStatus] = useState("idle");
  const [anError, setAnError] = useState("");
  const [anWarnings, setAnWarnings] = useState([]);
  const [reportUrl, setReportUrl] = useState("");
  const [anStepKey, setAnStepKey] = useState("");   // current active pipeline stage
  const [anDoneSteps, setAnDoneSteps] = useState([]); // completed stage keys

  // Live elapsed-time counters so the user always sees real motion, even if the
  // gateway buffers the SSE stage events.
  const [cleanElapsed, setCleanElapsed] = useState(0);
  const [anElapsed, setAnElapsed] = useState(0);
  useEffect(() => {
    if (status !== "processing") return;
    setCleanElapsed(0);
    const t0 = Date.now();
    const id = setInterval(() => setCleanElapsed(Math.round((Date.now() - t0) / 1000)), 250);
    return () => clearInterval(id);
  }, [status]);
  useEffect(() => {
    if (anStatus !== "processing") return;
    setAnElapsed(0);
    const t0 = Date.now();
    const id = setInterval(() => setAnElapsed(Math.round((Date.now() - t0) / 1000)), 250);
    return () => clearInterval(id);
  }, [anStatus]);

  // Fallback only — the server (/api/chat) forces the configured LLM_MODEL primary.
  const model = "qwen/qwen3-5-27b";
  const canRun = parsedSegments.length > 0 && status !== "processing";
  const canAnalyze = analysisText.trim() && anType && anObjectives.trim() && anStatus !== "processing";

  // When cleaning finishes, seed the analysis textarea (user can still edit before analyzing).
  useEffect(() => {
    if (status === "done" && output) setAnalysisText(output);
  }, [status]);

  // Keep the objectives textarea sized to its content (covers programmatic clears too).
  useEffect(() => { autoGrow(objRef.current); }, [anObjectives]);

  function ingestText(text, name) {
    const isVtt = /WEBVTT/i.test(text.slice(0, 200));
    const segs = isVtt ? parseVTT(text) : parsePlainTranscript(text);
    if (!segs.length) {
      setToast("Không tìm thấy nội dung transcript trong file");
      return;
    }
    setVttRaw(text);
    setFileName(name);
    setVttPreview(text.split("\n").filter((l) => l.trim()).slice(0, 5).join("\n"));
    setParsedSegments(segs);
    setOutput("");
    setStatus("idle");
  }

  function loadFile(file) {
    if (!file) return;
    const ext = (file.name.split(".").pop() || "").toLowerCase();

    if (ext === "docx" || ext === "doc") {
      const reader = new FileReader();
      reader.onload = (e) => {
        if (!window.mammoth) {
          setToast("Thư viện đọc file Word chưa tải xong, thử lại sau giây lát");
          return;
        }
        window.mammoth
          .extractRawText({ arrayBuffer: e.target.result })
          .then((result) => {
            const text = String(result.value || "").trim();
            if (!text) {
              setToast("File Word rỗng hoặc không đọc được nội dung");
              return;
            }
            ingestText(text, file.name);
          })
          .catch(() => {
            setToast(
              ext === "doc"
                ? "Không đọc được .doc (định dạng cũ). Vui lòng lưu lại thành .docx rồi tải lên."
                : "Không đọc được file Word này"
            );
          });
      };
      reader.readAsArrayBuffer(file);
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => ingestText(String(e.target.result || ""), file.name);
    reader.readAsText(file, "utf-8");
  }

  function reset() {
    setVttRaw(""); setVttPreview(""); setFileName(""); setParsedSegments([]);
    setOutput(""); setStatus("idle"); setErrorMsg(""); setProgress({ current: 0, total: 0 });
    if (fileRef.current) fileRef.current.value = "";
  }

  // Full reset — clears both the clean step and the report step so the user can start
  // fresh without reloading the page. Revokes the report blob to avoid leaking it.
  function newSession() {
    reset();
    if (reportUrl) URL.revokeObjectURL(reportUrl);
    setAnalysisText(""); setAnType("ux"); setAnObjectives(""); setAnTitle("");
    setAnLang("auto"); setAnStatus("idle"); setAnError(""); setAnWarnings([]); setReportUrl("");
    setAnStepKey(""); setAnDoneSteps([]);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  async function run() {
    setStatus("processing");
    setErrorMsg("");
    setOutput("");
    const systemPrompt = compileSystemPrompt(ALL_STAGES, "");
    const fullText = segmentsToText(parsedSegments);
    const estTokens = Math.ceil(fullText.length / 4);

    try {
      if (estTokens <= 5000) {
        setProgress({ current: 1, total: 1 });
        const res = await callLLM(fullText, systemPrompt, model);
        setOutput(res);
      } else {
        const chunks = chunkByTurns(fullText, 3000);
        setProgress({ current: 0, total: chunks.length });
        let acc = "";
        for (let i = 0; i < chunks.length; i++) {
          setProgress({ current: i + 1, total: chunks.length });
          if (i > 0) await new Promise((r) => setTimeout(r, 700));
          try {
            const res = await callLLM(chunks[i], systemPrompt, model);
            acc += (acc ? "\n\n" : "") + res;
            setOutput(acc);
          } catch (err) {
            setOutput(acc);
            throw new Error(`Xử lý bị gián đoạn tại phần ${i + 1}/${chunks.length}: ${err.message}`);
          }
        }
      }
      setStatus("done");
    } catch (err) {
      setErrorMsg(err.message || "Lỗi kết nối. Vui lòng thử lại.");
      setStatus("error");
    }
  }

  function copyOutput() {
    navigator.clipboard.writeText(output).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  }

  async function analyze() {
    if (!canAnalyze) return;
    setAnStatus("processing");
    setAnError("");
    setAnWarnings([]);
    setAnStepKey("");
    setAnDoneSteps([]);
    if (reportUrl) URL.revokeObjectURL(reportUrl);
    setReportUrl("");

    const base = (fileName ? fileName.replace(/\.[^.]+$/, "") : "transcript");
    const body = JSON.stringify({
      type: anType,
      mode: "single",
      files: [{ name: `${base}_cleaned.txt`, content_base64: toB64Utf8(analysisText), participant: "transcript" }],
      objectives: anObjectives,
      options: { study_title: anTitle || null, language: anLang },
    });

    function finishOk(html, meta) {
      setAnWarnings((meta && meta.warnings) || []);
      const blob = new Blob([html], { type: "text/html" });
      setReportUrl(URL.createObjectURL(blob));
      setAnDoneSteps(AN_STEPS.map((s) => s.key));
      setAnStepKey("");
      setAnStatus("done");
    }

    try {
      // Preferred path: stream real pipeline stages over SSE.
      const resp = await fetch("/api/analyze-stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body,
      });
      if (!resp.ok || !resp.body) throw new Error("stream-unavailable");

      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = "";
      let settled = false;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        let idx;
        while ((idx = buf.indexOf("\n\n")) >= 0) {
          const frame = buf.slice(0, idx);
          buf = buf.slice(idx + 2);
          const dl = frame.split("\n").find((l) => l.startsWith("data:"));
          if (!dl) continue;
          let evt;
          try { evt = JSON.parse(dl.slice(5).trim()); } catch (e) { continue; }
          if (evt.event === "step") {
            const i = AN_STEPS.findIndex((s) => s.key === evt.key);
            setAnDoneSteps(AN_STEPS.slice(0, Math.max(0, i)).map((s) => s.key));
            setAnStepKey(evt.key);
          } else if (evt.event === "done") {
            settled = true;
            finishOk(evt.html, evt.meta);
          } else if (evt.event === "error") {
            settled = true;
            setAnError(evt.error || "unknown");
            setAnStatus("error");
          }
        }
      }
      if (!settled) throw new Error("stream-ended-early");
    } catch (err) {
      // Backend without the streaming route (or a dropped stream) → one-shot /invocations.
      if (err.message === "stream-unavailable" || err.message === "stream-ended-early") {
        try {
          const resp = await fetch("/invocations", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body,
          });
          const data = await resp.json();
          if (data.status === "error") {
            setAnError(data.error || "unknown");
            setAnStatus("error");
            return;
          }
          finishOk(data.html, data.meta);
        } catch (e2) {
          setAnError(e2.message || "Lỗi mạng. Vui lòng thử lại.");
          setAnStatus("error");
        }
      } else {
        setAnError(err.message || "Lỗi mạng. Vui lòng thử lại.");
        setAnStatus("error");
      }
    }
  }

  function downloadReport() {
    if (!reportUrl) return;
    const a = document.createElement("a");
    a.href = reportUrl;
    a.download = "bao-cao.html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  const cleanChip =
    status === "processing" ? <span className="status-chip status-proc"><i className="ti ti-loader-2 ti-spin"></i> Đang xử lý{progress.total > 1 ? ` ${progress.current}/${progress.total}` : ""} · {cleanElapsed}s</span>
    : status === "done" ? <span className="status-chip status-ok"><i className="ti ti-check"></i> Hoàn tất</span>
    : status === "error" ? <span className="status-chip status-err"><i className="ti ti-alert-triangle"></i> Lỗi</span>
    : <span className="status-chip status-ok"><i className="ti ti-check"></i> Sẵn sàng</span>;

  return (
    <div className="sb-wrap">
      <Toast msg={toast} onClose={() => setToast("")} />

      {/* HEADER */}
      <header className="sb-header">
        <div style={{ display: "flex", alignItems: "center", gap: 13 }}>
          <div className="logo-box">SC</div>
          <div>
            <p style={{ margin: 0, fontSize: 17, fontWeight: 600 }}>Scribe</p>
            <p style={{ margin: 0, fontSize: 12, color: "var(--text-secondary)" }}>Làm sạch &amp; phân tích transcript</p>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <svg height="22" viewBox="0 0 114 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ZaloPay" style={{ display: "block" }}>
            <path d="M68.4248 16.3163C72.1913 16.3163 75.2577 19.3819 75.2578 23.1483C75.2578 26.9149 72.1933 29.9813 68.4248 29.9813C67.1817 29.9813 66.0194 29.6434 65.0137 29.0604V35.0985H61.5928V23.1483C61.5929 19.382 64.6565 16.3164 68.4248 16.3163ZM98.6367 24.8085L102.275 16.3202H106L97.9512 35.0985H94.2275L96.7432 29.2323L91.4863 16.3202H95.1807L98.6367 24.8085ZM90.1865 16.3163V26.5585H91.8896V29.9813H90.6787C89.3061 29.9813 88.1012 29.2745 87.4004 28.2069C86.246 29.3032 84.7193 29.9792 83.0381 29.9794C79.4472 29.9794 76.5332 26.9246 76.5332 23.1561C76.5333 19.3877 79.4453 16.3339 83.0381 16.3339C84.424 16.334 85.7058 16.7912 86.7598 17.5653V16.3163H90.1865ZM68.4248 19.7372C66.5446 19.7373 65.0138 21.2682 65.0137 23.1483C65.0137 25.0286 66.5446 26.5593 68.4248 26.5594C70.3071 26.5594 71.8359 25.0287 71.8359 23.1483C71.8358 21.2681 70.3051 19.7372 68.4248 19.7372ZM83.3564 19.7509C81.4761 19.7509 79.9523 21.2739 79.9521 23.1542C79.9521 25.0346 81.4761 26.5585 83.3564 26.5585C85.2367 26.5583 86.7598 25.0345 86.7598 23.1542C86.7596 21.274 85.2366 19.751 83.3564 19.7509Z" fill="#00CF6A"/>
            <path d="M36.5898 26.5583H38.293V29.9812H37.082C35.7095 29.9811 34.5045 29.2743 33.8037 28.2068C32.6493 29.3031 31.1227 29.9791 29.4414 29.9792C25.8505 29.9792 22.9365 26.9245 22.9365 23.156C22.9367 19.3877 25.8487 16.3337 29.4414 16.3337C30.8273 16.3338 32.1091 16.7912 33.1631 17.5652V16.3162H36.5898V26.5583ZM52.2178 16.3162C55.9842 16.3162 59.0496 19.3818 59.0498 23.1482C59.0498 26.9148 55.9843 29.9812 52.2178 29.9812C48.4513 29.9811 45.3857 26.9147 45.3857 23.1482C45.386 19.3819 48.4514 16.3163 52.2178 16.3162ZM19.8594 12.9011C20.5291 12.9011 21.1313 13.2736 21.4307 13.8718C21.7299 14.4703 21.6662 15.175 21.2646 15.7097L13.1299 26.5583H21.6572V29.9792H9.7959C9.12792 29.9792 8.52483 29.608 8.22559 29.0095C7.92657 28.4111 7.99013 27.7063 8.3916 27.1716L16.5293 16.322H8V12.9011H19.8594ZM43.0186 12.9011V26.5544H44.7334V29.9792H43.5107C41.3449 29.9791 39.59 28.2223 39.5898 26.0564V12.9011H43.0186ZM52.2178 19.7371C50.3357 19.7371 48.8069 21.2681 48.8066 23.1482C48.8066 25.0285 50.3375 26.5602 52.2178 26.5603C54.1001 26.5603 55.6289 25.0286 55.6289 23.1482C55.6287 21.268 54.1 19.7371 52.2178 19.7371ZM29.7598 19.7507C27.8795 19.7507 26.3557 21.2738 26.3555 23.1541C26.3555 25.0344 27.8794 26.5583 29.7598 26.5583C31.6401 26.5582 33.1631 25.0344 33.1631 23.1541C33.1629 21.2739 31.6399 19.7508 29.7598 19.7507Z" fill="#0033C9"/>
          </svg>
          <button className="ghost" onClick={newSession}><i className="ti ti-refresh"></i>Phiên mới</button>
        </div>
      </header>

      {/* STEP 1 — CLEAN */}
      <section className="sb-card">
        <div className="card-head">
          <div className="badge-n">1</div>
          <div>
            <p className="card-title">Làm sạch transcript</p>
            <p className="card-sub">Tải file ghi âm/ghi chép lên để dọn sạch</p>
          </div>
        </div>

        {!vttRaw ? (
          <div
            className={`dz${dragOver ? " drag" : ""}`}
            onClick={() => fileRef.current && fileRef.current.click()}
            onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={(e) => { e.preventDefault(); setDragOver(false); loadFile(e.dataTransfer.files[0]); }}
          >
            <i className="ti ti-cloud-upload dz-ic"></i>
            <p className="dz-t">Kéo thả file vào đây, hoặc bấm để chọn</p>
            <p className="dz-s">Hỗ trợ .vtt, .docx và .txt</p>
            <input
              ref={fileRef}
              type="file"
              accept=".vtt,.docx,.doc,.txt,text/vtt,text/plain,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
              hidden
              onChange={(e) => loadFile(e.target.files[0])}
            />
          </div>
        ) : (
          <div className="filebox">
            <div className="file-row">
              <span className="file-name"><i className="ti ti-file-text" style={{ color: "var(--brand-blue)" }}></i>{fileName} · {parsedSegments.length} lượt thoại</span>
              <button className="ghost sm" onClick={reset}><i className="ti ti-refresh"></i>Đổi file</button>
            </div>
            <pre className="file-pre scrollbar-thin">{vttPreview}</pre>
            <button className="cta-btn cta-blue" onClick={run} disabled={!canRun}>
              <i className={status === "processing" ? "ti ti-loader-2 ti-spin" : "ti ti-wand"}></i>
              {status === "processing" ? "Đang làm sạch…" : "Làm sạch transcript"}
            </button>
            {status === "processing" ? (
              <div style={{ marginTop: 12 }}>
                <div className={`pbar ${progress.total > 1 ? "det" : "indet"}`}>
                  <i style={progress.total > 1 ? { transform: `scaleX(${progress.current / progress.total})` } : undefined}></i>
                </div>
                <div className="an-panel-head" style={{ marginBottom: 0 }}>
                  <span className="elapsed">{progress.total > 1 ? `Đang làm sạch — phần ${progress.current}/${progress.total}` : "Đang làm sạch transcript…"}</span>
                  <span className="elapsed">{cleanElapsed}s</span>
                </div>
              </div>
            ) : (
              <p className="dz-s" style={{ marginTop: 10 }}>Bản ghi dài có thể mất một chút thời gian — bạn cứ để cửa sổ này mở nhé.</p>
            )}
          </div>
        )}

        <div className="row-between">
          <span className="lbl" style={{ margin: 0 }}>Bản đã làm sạch</span>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {output && (
              <React.Fragment>
                <button className="ghost sm" onClick={copyOutput}><i className="ti ti-copy"></i>{copied ? "Đã sao chép" : "Sao chép"}</button>
                <button className="ghost sm" onClick={() => downloadTxt(output)}><i className="ti ti-download"></i>Tải .txt</button>
              </React.Fragment>
            )}
            {cleanChip}
          </div>
        </div>
        <div className={`clean-out scrollbar-thin${output ? " filled" : ""}`}>
          {errorMsg && <div className="msg-err" style={{ marginTop: 0, marginBottom: 8 }}>{errorMsg}</div>}
          {output ? renderOutput(output) : <span>Bản đã làm sạch sẽ hiện ở đây sau khi xử lý.</span>}
        </div>
      </section>

      {/* STEP 2 — ANALYZE */}
      <section className="sb-card">
        <div className="card-head">
          <div className="badge-n">2</div>
          <div>
            <p className="card-title">Tạo báo cáo</p>
            <p className="card-sub">Tinh chỉnh nội dung &amp; tuỳ chọn trước khi tạo</p>
          </div>
        </div>

        <div className="row-between">
          <span className="lbl" style={{ margin: 0 }}>Nội dung phân tích</span>
          {output && (
            <button className="ghost sm" onClick={() => setAnalysisText(output)}><i className="ti ti-arrow-down"></i>Lấy từ bước làm sạch</button>
          )}
        </div>
        <div className="flt">
          <textarea
            className="flt-in"
            placeholder=" "
            value={analysisText}
            onChange={(e) => setAnalysisText(e.target.value)}
          ></textarea>
          <span className="flt-lb">Dán hoặc chỉnh sửa nội dung cần phân tích — bạn có thể sửa tay</span>
        </div>

        <label className="lbl">Loại nội dung</label>
        <div className="seg-group">
          {TYPES.map((t) => (
            <span
              key={t.v}
              className={`seg${anType === t.v ? " on" : ""}`}
              onClick={() => setAnType(t.v)}
            >
              {t.label}
            </span>
          ))}
        </div>

        <div className="flt">
          <textarea
            ref={objRef}
            className="flt-area scrollbar-thin"
            placeholder=" "
            rows={1}
            value={anObjectives}
            onChange={(e) => { setAnObjectives(e.target.value); autoGrow(e.target); }}
          ></textarea>
          <span className="flt-lb">Mục tiêu / câu hỏi nghiên cứu *</span>
        </div>

        <div className="grid-2">
          <div className="flt" style={{ marginBottom: 0 }}>
            <input
              className="flt-in"
              placeholder=" "
              value={anTitle}
              onChange={(e) => setAnTitle(e.target.value)}
            />
            <span className="flt-lb">Tên dự án (không bắt buộc)</span>
          </div>
          <div className="flt" style={{ marginBottom: 0 }}>
            <select className="flt-in" value={anLang} onChange={(e) => setAnLang(e.target.value)}>
              <option value="auto">Tự động theo transcript</option>
              <option value="vi">Tiếng Việt</option>
              <option value="en">English</option>
            </select>
            <span className="flt-lb">Ngôn ngữ báo cáo</span>
            <i className="ti ti-chevron-down" style={{ position: "absolute", right: 16, top: 22, color: "var(--text-tertiary)", pointerEvents: "none" }}></i>
          </div>
        </div>

        <button className="cta-btn" onClick={analyze} disabled={!canAnalyze}>
          <i className={anStatus === "processing" ? "ti ti-loader-2 ti-spin" : "ti ti-sparkles"}></i>
          {anStatus === "processing" ? `Đang tạo báo cáo… ${anElapsed}s` : "Tạo báo cáo"}
        </button>

        {anStatus === "processing" && (
          <div className="an-panel">
            <div className="an-panel-head">
              <span className="an-panel-title">Tiến trình tạo báo cáo</span>
              <span className="elapsed">{anElapsed}s</span>
            </div>
            <div className="pbar indet"><i></i></div>
            <ul className="steps">
              {AN_STEPS.map((s) => {
                const done = anDoneSteps.indexOf(s.key) >= 0;
                const active = anStepKey === s.key;
                return (
                  <li key={s.key} className={`step${done ? " done" : active ? " active" : ""}`}>
                    <span className="dot">
                      {done ? <i className="ti ti-check"></i> : active ? <i className="ti ti-loader-2 ti-spin"></i> : ""}
                    </span>
                    {s.label}
                  </li>
                );
              })}
            </ul>
          </div>
        )}

        {anError && <div className="msg-err">Có lỗi xảy ra: {anError}</div>}
        {anWarnings.length > 0 && <div className="msg-warn">Lưu ý: {anWarnings.join(" · ")}</div>}
      </section>

      {/* SUCCESS ZONE */}
      {anStatus === "done" && reportUrl && (
        <section className="sb-card success-card">
          <div className="success-ic"><i className="ti ti-circle-check"></i></div>
          <p className="success-title">Báo cáo đã sẵn sàng</p>
          <p className="success-sub">Hệ thống đã làm sạch transcript và tạo báo cáo phân tích. Bạn có thể xem trực tiếp hoặc tải về để chia sẻ.</p>
          <div className="success-actions">
            <a className="btn-primary" href={reportUrl} target="_blank" rel="noopener"><i className="ti ti-eye"></i>Xem báo cáo</a>
            <button className="btn-outline" onClick={downloadReport}><i className="ti ti-download"></i>Tải file</button>
          </div>
        </section>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
